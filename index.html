<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponti Data Studio - Portfolio</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Mencegah seluruh halaman ikut me-scroll */
        }

        .iframe-container {
            width: 90%;            
            max-width: 600px;      
            aspect-ratio: 1 / 1;   
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); /* Shadow dibuat lebih halus */
            border-radius: 12px;   /* Lengkungan sudut disesuaikan agar lebih modern */
            overflow: hidden;      /* Menyembunyikan sisa konten/scrollbar di luar kotak */
            background-color: #101726; /* Match warna background dengan tema gelap Anda saat loading */
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbx4lyjlkXWGclNmdSZiJq_zoXWR8mixHKs0smEzkJ5vi-AvQVRHGzWzDeC9vEBm0a65Eg/exec"></iframe>
    </div>

</body>
</html>
