<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponti Data Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <header class="bg-slate-900/80 backdrop-blur border-b border-slate-800 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-blue-600 to-emerald-500 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/20">
                    P
                </div>
                <div>
                    <h1 class="font-extrabold tracking-wide text-lg">Ponti Data Studio</h1>
                    <p class="text-xs text-slate-400 font-mono">Cloud System & Automation Platform</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <a href="https://script.google.com/macros/s/AKfycbx4lyjlkXWGclNmdSZiJq_zoXWR8mixHKs0smEzkJ5vi-AvQVRHGzWzDeC9vEBm0a65Eg/exec" 
                   target="_blank" 
                   class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm font-semibold transition-colors border border-slate-700">
                    <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i> Buka Penuh
                </a>
                <span class="h-5 w-px bg-slate-800 hidden sm:inline"></span>
                <div class="text-xs text-slate-400 bg-emerald-500/10 border border-emerald-500/20 px-2.5 py-1 rounded-full flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Terhubung via Apps Script
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-6">
        <div class="w-full h-[calc(100vh-140px)] min-h-[600px] bg-slate-900 rounded-xl border border-slate-800 overflow-hidden shadow-2xl relative group">
            
            <iframe 
                src="https://script.google.com/macros/s/AKfycbx4lyjlkXWGclNmdSZiJq_zoXWR8mixHKs0smEzkJ5vi-AvQVRHGzWzDeC9vEBm0a65Eg/exec" 
                class="w-full h-full border-none"
                allow="geolocation; microphone; camera; midi; encrypted-media;"
                loading="lazy">
            </iframe>
            
        </div>
    </main>

    <footer class="py-4 text-center border-t border-slate-900 text-xs text-slate-500 font-mono">
        &copy; 2026 Ponti Data Studio. Didukung oleh Google Apps Script & GitHub Pages.
    </footer>

</body>
</html>
