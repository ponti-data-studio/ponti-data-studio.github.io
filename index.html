<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pontidata.id/">
    <meta property="og:title" content="Ponti Data ID - Google Workspace Specialist">
    <meta property="og:description" content="Ubah Google Sheets Anda menjadi aplikasi mobile, sistem otomatis, dan dashboard interaktif.">
    <meta property="og:image" content="https://pontidata.id/web-preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <title>Ponti Data ID</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2">

    <!-- PWA: manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- PWA: Android / Chrome / Windows install -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Ponti Data">

    <!-- PWA: iOS (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ponti Data">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycby2PAOWg5LxfK871pS4ftcP96nE6pfVoeJZ8Bk8t2F9jYt5TaOKIOOgSFE4GHPIKBX21Q/exec"></iframe>

    <script>
        // Daftarkan service worker supaya situs memenuhi syarat "installable" PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch((err) => {
                    console.warn('SW registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
