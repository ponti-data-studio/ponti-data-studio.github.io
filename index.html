<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Apps Script Embed</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .iframe-container {
            width: 90%;            /* Lebar kontainer di layar (bisa disesuaikan) */
            max-width: 600px;      /* Batas lebar maksimal agar tidak terlalu besar */
            aspect-ratio: 1 / 1;   /* Memaksa rasio selalu 1:1 (Kotak Sempurna) */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbx4lyjlkXWGclNmdSZiJq_zoXWR8mixHKs0smEzkJ5vi-AvQVRHGzWzDeC9vEBm0a65Eg/exec"></iframe>
    </div>

</body>
</html>
