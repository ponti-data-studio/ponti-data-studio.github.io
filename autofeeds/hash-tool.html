<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generator Password — Setup</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#0a0405; color:#fafafa; font-family:Inter,system-ui,-apple-system,sans-serif; padding:24px; }
  .card { width:100%; max-width:520px; background:#160a0c; border:1px solid rgba(239,68,68,.3);
    border-radius:16px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  h1 { font-size:20px; margin:0 0 6px; }
  p { font-size:13px; color:rgba(255,255,255,.6); line-height:1.6; margin:0 0 18px; }
  label { font-size:12px; font-weight:600; display:block; margin-bottom:6px; }
  input { width:100%; box-sizing:border-box; padding:12px 14px; border-radius:10px;
    background:#0a0405; border:1px solid rgba(255,255,255,.15); color:#fff; font-size:15px; }
  .out { margin-top:18px; background:#0a0405; border:1px solid rgba(255,255,255,.12);
    border-radius:10px; padding:14px; }
  .out .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.4); margin-bottom:6px; }
  .hash { font-family:ui-monospace,Menlo,monospace; font-size:13px; word-break:break-all; color:#fca5a5; }
  button { margin-top:12px; width:100%; padding:12px; border:0; border-radius:10px; cursor:pointer;
    background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; font-size:14px; font-weight:700; }
  .ok { color:#4ade80; font-size:12px; text-align:center; margin-top:10px; height:14px; }
  code { background:rgba(255,255,255,.08); padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔐 Generator Password Login</h1>
    <p>
      Ketik password yang kamu mau, lalu salin hasil hash-nya ke <code>config.js</code>
      pada bagian <code>loginPasswordHash</code>. Password aslinya TIDAK pernah ikut
      tersimpan di website — jadi tidak bisa dibaca orang lain.
    </p>
    <label for="pwd">Password yang diinginkan</label>
    <input id="pwd" type="text" placeholder="mis. RahasiaBrandKu123" autocomplete="off" />
    <div class="out">
      <div class="lbl">loginPasswordHash (salin ini)</div>
      <div class="hash" id="hash">—</div>
    </div>
    <button id="copy">Salin Hash</button>
    <div class="ok" id="ok"></div>
  </div>
<script>
  // HARUS sama dengan salt di aplikasi.
  var SALT = 'af-studio-2026::';
  var pwdEl = document.getElementById('pwd');
  var hashEl = document.getElementById('hash');
  var okEl = document.getElementById('ok');

  function toHex(buf){ return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join(''); }

  async function update(){
    var p = pwdEl.value;
    if(!p){ hashEl.textContent='—'; return; }
    var data = new TextEncoder().encode(SALT + p);
    var buf = await crypto.subtle.digest('SHA-256', data);
    hashEl.textContent = toHex(buf);
  }
  pwdEl.addEventListener('input', update);
  document.getElementById('copy').addEventListener('click', function(){
    var t = hashEl.textContent;
    if(!t || t==='—') return;
    navigator.clipboard.writeText(t).then(function(){
      okEl.textContent='✓ Hash disalin — tempel ke config.js';
      setTimeout(function(){ okEl.textContent=''; }, 2500);
    });
  });
</script>
</body>
</html>
